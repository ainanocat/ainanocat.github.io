<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | ainanocat</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body data-page="contact">
  <div class="container">
    <div id="navbar"></div>

    <main class="single-column">
      <section class="panel">
        <h1 class="section-title" data-i18n="contactTitle"></h1>
        <p class="hero-desc" data-i18n="contactIntro"></p>

        <div class="contact-grid">
          <div class="contact-item">
            <span class="label" data-i18n="contactEmailLabel"></span>
            <a class="value" href="mailto:hello@ainanocat.com">hello@ainanocat.com</a>
          </div>
          <div class="contact-item">
            <span class="label" data-i18n="contactWeChatLabel"></span>
            <span class="value">ainanocat</span>
          </div>
          <div class="contact-item">
            <span class="label" data-i18n="contactGithubLabel"></span>
            <a class="value" href="https://github.com/ainanocat" target="_blank" rel="noreferrer">github.com/ainanocat</a>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <span data-i18n="footerLeft"></span>
      <span data-i18n="footerRight"></span>
    </footer>
  </div>

  <script src="./navbar.js"></script>
  <script src="./app.js"></script>
</body>
</html>
